<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Razorpay Payment</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
    <button id="rzp-button1">Pay with Razorpay</button>
    <script>
        var options = {
            "key": "rzp_test_SRPTQjvlMfbvQw", // Enter the Key ID generated from the Dashboard
            "amount": "140000", // Amount is in currency subunits. Default currency is INR. Hence, 50000 refers to 50000 paise
            "currency": "INR",
            "name": "Acme Corp",
            "description": "Test Transaction",
            "image": "https://example.com/your_logo",
            "order_id": "order_SRp8DowTL8KRNn", // This is a sample Order ID. Pass the `id` obtained in the response of Step 1
            "handler": function (response) {
                console.log('Razorpay Payment ID:', response.razorpay_payment_id);
                console.log('Razorpay Order ID:', response.razorpay_order_id);
                console.log('Razorpay Signature:', response.razorpay_signature);
            },
            "prefill": {
                "name": "Midhun",
                "email": "midhuns@example.com",
                "contact": "1234567890"
            },
            "notes": {
                "address": "raipur"
            },
            "theme": {
                "color": "#3399cc"
            }
        };

        var rzp1 = new Razorpay(options);

        rzp1.on('payment.failed', function (response) {
            console.error('Payment Failed:', response.error);
        });

        document.getElementById('rzp-button1').onclick = function (e) {
            rzp1.open();
            e.preventDefault();
        }
    </script>
</body>
</html>
